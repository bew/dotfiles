matches:
  # note: this one is a kind of workaround for Google Keep..
  # @2026-04 inserting '^e' there gives a buggy 'ê'... (next letter deletes the 'ê' char ><)
  - trigger: "!e^!"
    replace: ê

  - trigger: "!é!" # upper version
    replace: É

  - trigger: "!ç!" # upper version
    replace: Ç

  - trigger: "!A!" # accented version
    replace: À
