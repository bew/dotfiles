# -----------------------------------------------------------
# Gloabl vars about the config

# Set the config status, either `server-init` (during first server init) or `reloading`
set -gF @mycfg-config-status "#{?#{@mycfg-config-status},#{@mycfg-config-status},server-init}"

# Store the config dir in a tmux native var so it works both
# for relative sources and for relative script runs.
# (`#{d:current_file}` expansion doesn't work there)
set -gF @mycfg-config-dir "#{d:current_file}"

# -----------------------------------------------------------
# Config files loading 🚀

# Load options in order of importance
# (note: numbers used for ordering on filesystem)
source -F "#{@mycfg-config-dir}/options-0-general.conf"
source -F "#{@mycfg-config-dir}/options-3-terminal.conf"
source -F "#{@mycfg-config-dir}/options-5-appearance.conf"

source -F "#{@mycfg-config-dir}/layout-hooks.conf"
source -F "#{@mycfg-config-dir}/mappings.conf"

# Load plugins (if available)
source -F "#{@mycfg-config-dir}/plugin-tmux-resurrect.conf"

# -----------------------------------------------------------
if -F "#{==:#{@mycfg-config-status},reloading}" {
  display-message -d 3000 "Config: #[bold]#{s/#{HOME}/~/:#{current_file}}#[default] reloaded!"
}
# Set config status for later reloads
set -gF @mycfg-config-status "reloading"
# NOTE: We don't set it as 'idle' or 'ready' to ensure invidual conf sourcing after initial load
#   would display a message (e.g. via `tmux source option-file.conf`).
